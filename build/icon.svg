<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="phone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Phone body -->
  <rect x="156" y="56" width="200" height="400" rx="32" ry="32" fill="url(#phone)" stroke="#4f46e5" stroke-width="4"/>
  <!-- Screen -->
  <rect x="176" y="96" width="160" height="280" rx="8" ry="8" fill="#1e1b4b"/>
  <!-- Screen content - battery bar -->
  <rect x="196" y="140" width="120" height="16" rx="8" ry="8" fill="#312e81"/>
  <rect x="196" y="140" width="90" height="16" rx="8" ry="8" fill="url(#accent)"/>
  <!-- Screen content - temp bar -->
  <rect x="196" y="170" width="120" height="16" rx="8" ry="8" fill="#312e81"/>
  <rect x="196" y="170" width="70" height="16" rx="8" ry="8" fill="#f59e0b"/>
  <!-- Screen content - process bar -->
  <rect x="196" y="200" width="120" height="16" rx="8" ry="8" fill="#312e81"/>
  <rect x="196" y="200" width="100" height="16" rx="8" ry="8" fill="#3b82f6"/>
  <!-- Lightning bolt (optimization) -->
  <polygon points="270,250 246,300 262,300 242,360 300,290 278,290 298,250" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  <!-- Gear (settings/optimization) -->
  <circle cx="370" cy="390" r="40" fill="url(#accent)" stroke="#047857" stroke-width="3"/>
  <circle cx="370" cy="390" r="16" fill="#1e1b4b"/>
  <!-- Gear teeth -->
  <rect x="362" y="345" width="16" height="18" rx="4" fill="url(#accent)" stroke="#047857" stroke-width="2"/>
  <rect x="362" y="417" width="16" height="18" rx="4" fill="url(#accent)" stroke="#047857" stroke-width="2"/>
  <rect x="325" y="382" width="18" height="16" rx="4" fill="url(#accent)" stroke="#047857" stroke-width="2"/>
  <rect x="397" y="382" width="18" height="16" rx="4" fill="url(#accent)" stroke="#047857" stroke-width="2"/>
  <!-- Diagonal gear teeth -->
  <rect x="340" y="352" width="16" height="16" rx="4" fill="url(#accent)" stroke="#047857" stroke-width="2" transform="rotate(45 348 360)"/>
  <rect x="388" y="352" width="16" height="16" rx="4" fill="url(#accent)" stroke="#047857" stroke-width="2" transform="rotate(45 396 360)"/>
  <rect x="340" y="412" width="16" height="16" rx="4" fill="url(#accent)" stroke="#047857" stroke-width="2" transform="rotate(45 348 420)"/>
  <rect x="388" y="412" width="16" height="16" rx="4" fill="url(#accent)" stroke="#047857" stroke-width="2" transform="rotate(45 396 420)"/>
  <!-- Home button area -->
  <circle cx="256" cy="416" r="16" fill="none" stroke="#a5b4fc" stroke-width="3"/>
  <!-- Top speaker -->
  <rect x="236" y="72" width="40" height="6" rx="3" fill="#a5b4fc"/>
</svg>
