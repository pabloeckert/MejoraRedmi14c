name: ShellCheck

on:
  push:
    branches: [ main, "claude/**" ]
    paths:
      - '**.sh'
  pull_request:
    branches: [ main ]
    paths:
      - '**.sh'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error
          ignore_paths: >-
            rescue-points
            logs
          additional_files: "*.sh"
