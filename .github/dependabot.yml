version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "deps"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      dev-tools:
        patterns:
          - "vite"
          - "vitest"
          - "eslint"
          - "playwright"
          - "@playwright/*"
      electron:
        patterns:
          - "electron"
          - "electron-builder"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
